name: Corpus Refresh (bookmarks + engines)

# Advances the research/bookmarks pointer to the corpus tip AND regenerates
# everything derived from it (feed queue, enrichment worklist, synthesis briefs,
# citation index, widgets, status) in ONE PR.
#
# This replaces the old split of sync-research-bookmarks (every 6h) +
# site-refresh (weekly). That split meant the corpus could advance on Monday
# morning while the queue the fleet reads stayed a week stale. Now corpus and
# derived content always move together, which matters because the fleet runs off
# the enrichment worklist several times a day.
#
# Everything here is deterministic (keyword classifiers, no LLM), so it is safe
# to land zero-touch. LLM-authored content from the fleet is NEVER auto-merged —
# see _vault_maintenance/personas/FLEET.md.
#
# Secrets required:
#   GITEA_TOKEN — PAT with repo write (create/merge PRs)

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: corpus-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Advance corpus, regenerate, open + merge PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Main repo only — the automatic Actions token reads it. The corpus
          # submodule is a SEPARATE repo the auto token can't read, and Gitea's
          # checkout doesn't propagate a token to submodule clones, so init it
          # explicitly below.

      - name: Init corpus submodule (research/bookmarks, read via CI_PAT)
        run: |
          # CI_PAT is a read-only user PAT that can read pres/bookmarks. Scope the
          # credential to that repo path so it can't touch the main-repo push below.
          git config --global url."https://x-access-token:${{ secrets.CI_PAT }}@gitea.nexus-home.cc/pres/bookmarks".insteadOf "https://gitea.nexus-home.cc/pres/bookmarks"
          git submodule sync
          git submodule update --init research/bookmarks

      - name: Advance corpus to its tip
        id: corpus
        run: |
          BEFORE=$(git rev-parse HEAD:research/bookmarks)
          git submodule update --remote --recursive research/bookmarks
          AFTER=$(git -C research/bookmarks rev-parse HEAD)
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER"   >> "$GITHUB_OUTPUT"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "Corpus unchanged (${BEFORE:0:8})."
          else
            echo "Corpus advanced: ${BEFORE:0:8} -> ${AFTER:0:8}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        # postinstall (patch-package) runs as part of ci/install; .npmrc pins
        # include=dev so it can't be skipped. The old `|| true` here meant a
        # genuinely failed patch passed silently.
        run: |
          # provenance-cite is a Gitea-hosted git dependency; the runner has no
          # Gitea git creds, and REQUIRE_SIGNIN_VIEW blocks anonymous clones.
          # Scope the credential to that one repo path so the branch push below
          # (to eco-balance) keeps using the checkout token, not this one.
          git config --global url."https://x-access-token:${{ secrets.GITEA_TOKEN }}@gitea.nexus-home.cc/pres/provenance-cite".insteadOf "https://gitea.nexus-home.cc/pres/provenance-cite"
          npm ci || npm install

      - name: Run engines and prepare site
        run: |
          set -e
          npm run engine:feed
          npm run engine:enrich
          npm run engine:ecology
          npm run site:prepare

      - name: Detect changes
        id: changes
        run: |
          # Pointer bump and/or regenerated outputs both count.
          if [ -n "$(git status --porcelain -- research/bookmarks docs research/citation_index.json src/data state/status.json _engines/_reports)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Nothing changed this run."
          fi

      - name: Build digest
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          {
            echo "## Corpus refresh"
            echo ""
            echo "Corpus \`${{ steps.corpus.outputs.before }}\` -> \`${{ steps.corpus.outputs.after }}\`"
            echo ""
            if [ -f _engines/_reports/feed-queue.md ]; then
              sed -n '3p' _engines/_reports/feed-queue.md
              echo ""
              echo "### Newest unused (routed domain)"
              grep -E '^### |Suggested domain' _engines/_reports/enrichment-worklist.md | head -16
            fi
            echo ""
            if [ -f research/briefs/_assumptions.md ]; then
              echo "### Assumption checks / evidence gaps"
              sed -n '/## Evidence gaps/,/## Articles/p' research/briefs/_assumptions.md | head -12
            fi
            echo ""
            # Advancing the corpus can stand a citation up OR knock one down: the
            # vault dedupes same-URL double-captures, which strands whichever twin
            # a doc happened to cite. sync unlinks those so no broken anchor ships,
            # but that's silent — surface it here, because no PR caused it and
            # nothing else will mention it.
            if [ -f _engines/_reports/health.md ]; then
              UNRESOLVED=$(sed -n '/^## Unresolved citations/,/^## /p' _engines/_reports/health.md | grep -c '^- ' || true)
              if [ "${UNRESOLVED:-0}" -gt 0 ]; then
                echo "### ⚠️ Unresolved citations ($UNRESOLVED)"
                echo ""
                echo "These cite an article the corpus no longer holds, so they ship as plain"
                echo "text instead of a link. If the vault deduped a same-URL double-capture,"
                echo "the surviving twin has the same URL under a different entry_id."
                echo ""
                sed -n '/^## Unresolved citations/,/^## /p' _engines/_reports/health.md | grep '^- ' | head -10
              fi
            fi
          } > digest.md
          cat digest.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Commit, push, open + merge the standing PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}
        run: |
          set -e
          BRANCH="chore/corpus-refresh"

          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions@nexus-home.cc"
          git checkout -B "$BRANCH"

          # Corpus pointer + only the engine-generated areas.
          git add research/bookmarks docs research/citation_index.json src/data state/status.json _engines/_reports 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing staged after filtering; skipping."
            exit 0
          fi

          git commit -m "chore: corpus refresh (bookmarks + engines)"
          # Push with the automatic Actions token (it has same-repo write for free),
          # NOT the checkout token — so CI_PAT can stay READ-ONLY (it only needs to
          # read the bookmarks submodule). The explicit token URL bypasses origin's
          # read-only checkout credentials. (x-access-token:<token> is the same
          # basic-auth form the provenance-cite fetch uses.)
          HOST="${GITHUB_SERVER_URL#https://}"
          git push --force \
            "https://x-access-token:${GITEA_TOKEN}@${HOST}/${GITHUB_REPOSITORY}.git" \
            "HEAD:${BRANCH}"

          if [ -z "$GITEA_TOKEN" ]; then
            echo "::warning::GITEA_TOKEN not set - branch pushed, open the PR manually."
            exit 0
          fi

          AUTH="Authorization: token $GITEA_TOKEN"
          BODY=$(python3 -c 'import json;print(json.dumps(open("digest.md").read()))')

          NUM=$(curl -sf -H "$AUTH" "$API/pulls?state=open&limit=50" \
                | python3 -c "import json,sys;print(next((p['number'] for p in json.load(sys.stdin) if p['head']['ref']=='$BRANCH'), ''))" || echo "")

          if [ -n "$NUM" ]; then
            curl -sf -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
              "$API/pulls/$NUM" -d "{\"body\": $BODY}" >/dev/null || true
            echo "Updated standing PR #$NUM"
          else
            NUM=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" "$API/pulls" \
              -d "{\"head\":\"$BRANCH\",\"base\":\"main\",\"title\":\"chore: corpus refresh (bookmarks + engines)\",\"body\": $BODY}" \
              | python3 -c "import json,sys;print(json.load(sys.stdin)['number'])")
            echo "Opened PR #$NUM"
          fi

          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            "$API/pulls/$NUM/merge" \
            -d '{"Do":"squash","delete_branch_after_merge":true}' >/dev/null \
            && echo "Merged PR #$NUM" \
            || echo "::warning::Auto-merge failed; PR #$NUM left for manual merge."
