name: PR checks

# One fast, meaningful gate for pull requests: the site must build from source,
# and the model/case must pass the structural quality checks.
#
# This is the gate every fleet-authored PR passes through, so keep it honest and
# keep it quick. Ported from GitHub Actions; actions pinned to v4 (the versions
# Gitea's act_runner resolves reliably).

on:
  pull_request:
    branches: [main]
    # Only run when files that affect the build or quality actually change, so
    # mechanical submodule-bump PRs don't sit on a gate they can't affect.
    paths:
      - 'template/**'
      - 'case/**'
      - 'parameters/**'
      - 'docs/**'
      - 'src/**'
      - '_engines/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docusaurus.config.js'
      - 'sidebars.js'
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        # postinstall (patch-package) runs as part of ci/install; .npmrc pins
        # include=dev so it can't be skipped.
        run: |
          # provenance-cite is a Gitea-hosted git dependency; the runner has no
          # Gitea git creds, and REQUIRE_SIGNIN_VIEW blocks anonymous clones.
          # Auth just that one repo path (not the whole host) with the auto token.
          git config --global url."https://x-access-token:${{ secrets.GITEA_TOKEN }}@gitea.nexus-home.cc/pres/provenance-cite".insteadOf "https://gitea.nexus-home.cc/pres/provenance-cite"
          npm ci || npm install
      - name: Regenerate docs from source (template/case -> docs)
        run: npm run sync
      - name: Build website
        run: npm run build
        env:
          SITE_URL: https://docs.eco-balance.cc
          BASE_URL: '/'

  docs-quality:
    name: Docs quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Main repo only. The citation gate needs the corpus submodule (a separate
        # repo the auto token can't read, and checkout won't propagate a token to
        # submodule clones), so it's init'd explicitly in the next step.
      - name: Init corpus submodule (research/bookmarks, read via CI_PAT)
        run: |
          git config --global url."https://x-access-token:${{ secrets.CI_PAT }}@gitea.nexus-home.cc/pres/bookmarks".insteadOf "https://gitea.nexus-home.cc/pres/bookmarks"
          git submodule sync
          git submodule update --init research/bookmarks
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: |
          # provenance-cite is a Gitea-hosted git dependency; the runner has no
          # Gitea git creds, and REQUIRE_SIGNIN_VIEW blocks anonymous clones.
          # Auth just that one repo path (not the whole host) with the auto token.
          git config --global url."https://x-access-token:${{ secrets.GITEA_TOKEN }}@gitea.nexus-home.cc/pres/provenance-cite".insteadOf "https://gitea.nexus-home.cc/pres/provenance-cite"
          npm ci || npm install
      - name: Citation integrity gate
        # Fails if a citation points at an article the corpus doesn't hold.
        # This is the gate that would have caught the 11 stranded citations.
        run: node _engines/consistency/check.js --strict
      - name: Citation provenance gate
        # Phase 1 of CITATION_PROVENANCE_MODEL: validates `citations:` blocks via
        # the shared provenance-cite package (question/supports present, source
        # resolves, anchor verbatim). No-op until docs adopt the block.
        run: node _engines/consistency/check-citations.mjs --strict
      - name: Structural quality gate
        run: |
          node _engines/quality/audit.js
          node -e "
            const h = require('./src/data/health.json');
            const i = h.issues;
            const problems = [].concat(
              (i.domain_id_collisions || []).map(x => 'id-collision: ' + x),
              (i.orphan_decisions || []).map(x => 'orphan-decision: ' + x),
              (i.off_convention_decision_status || []).map(x => 'bad-status: ' + x),
              (i.parameter_gaps || []).map(x => 'param-gap: ' + x)
            );
            if (problems.length) {
              console.error('Structural quality issues:');
              for (const p of problems) console.error(' - ' + p);
              process.exit(1);
            }
            console.log('Structural quality OK — overall health ' + h.overall + '/100 (' + h.overall_grade + '), ' + h.issues.uncovered_domains.length + ' uncovered domain(s).');
          "
