name: Site Refresh (Engines)

# Regenerates the engine-derived content (feed queue, enrichment worklist,
# synthesis briefs, citation index, widgets, status) from the bookmark corpus,
# and opens ONE standing PR so publishing stays a single-click review.
#
# Ported from GitHub Actions, and simpler here: the runner is on the LAN with the
# Gitea instance, so the old "configure Gitea submodule auth + retry transient
# 502s through the Cloudflare tunnel" dance is gone — the submodule just clones.
# The gh CLI calls became Gitea API calls.
#
# Secrets required:
#   GITEA_TOKEN — PAT with repo write (create/merge PRs). Falls back to leaving
#                 the PR open for manual merge if unset.

on:
  schedule:
    # Every Monday 05:00 UTC
    - cron: '0 5 * * 1'
  workflow_dispatch:

concurrency:
  group: site-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Regenerate engine outputs and open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (with corpus submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          npm run postinstall || npx patch-package || true

      - name: Run engines and prepare site
        run: |
          set -e
          npm run engine:feed
          npm run engine:enrich
          npm run engine:ecology
          npm run site:prepare

      - name: Detect changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain -- docs research/citation_index.json src/data state/status.json _engines/_reports)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No regenerated changes this run."
          fi

      - name: Build digest
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          {
            echo "## Site refresh (engines)"
            echo ""
            if [ -f _engines/_reports/feed-queue.md ]; then
              sed -n '3p' _engines/_reports/feed-queue.md
              echo ""
              echo "### Newest unused (routed domain)"
              grep -E '^### |Suggested domain' _engines/_reports/enrichment-worklist.md | head -16
            fi
            echo ""
            if [ -f research/briefs/_assumptions.md ]; then
              echo "### Assumption checks / evidence gaps"
              sed -n '/## Evidence gaps/,/## Articles/p' research/briefs/_assumptions.md | head -12
            fi
          } > digest.md
          cat digest.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Commit, push, open/update the standing PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}
        run: |
          set -e
          BRANCH="chore/site-refresh"

          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions@nexus-home.cc"
          git checkout -B "$BRANCH"

          # Stage only engine-generated areas so unrelated files never sneak in.
          git add docs research/citation_index.json src/data state/status.json _engines/_reports 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing staged after filtering; skipping."
            exit 0
          fi

          git commit -m "chore: site refresh (engines)"
          git push --force origin "$BRANCH"

          if [ -z "$GITEA_TOKEN" ]; then
            echo "::warning::GITEA_TOKEN not set - branch pushed, open the PR manually."
            exit 0
          fi

          AUTH="Authorization: token $GITEA_TOKEN"
          BODY=$(python3 -c 'import json,sys;print(json.dumps(open("digest.md").read()))')

          # Reuse the standing PR if one is already open for this branch.
          NUM=$(curl -sf -H "$AUTH" "$API/pulls?state=open&limit=50" \
                | python3 -c "import json,sys;print(next((p['number'] for p in json.load(sys.stdin) if p['head']['ref']=='$BRANCH'), ''))" || echo "")

          if [ -n "$NUM" ]; then
            echo "PR #$NUM already open; force-push updated it. Refreshing body."
            curl -sf -X PATCH -H "$AUTH" -H "Content-Type: application/json" \
              "$API/pulls/$NUM" -d "{\"body\": $BODY}" >/dev/null || true
          else
            NUM=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" "$API/pulls" \
              -d "{\"head\":\"$BRANCH\",\"base\":\"main\",\"title\":\"chore: site refresh (engines)\",\"body\": $BODY}" \
              | python3 -c "import json,sys;print(json.load(sys.stdin)['number'])")
            echo "Opened PR #$NUM"
          fi

          # Deterministic regen only — safe to land zero-touch. (LLM-authored
          # content from the fleet is NOT auto-merged; see personas/FLEET.md.)
          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            "$API/pulls/$NUM/merge" \
            -d '{"Do":"squash","delete_branch_after_merge":true}' >/dev/null \
            && echo "Merged PR #$NUM" \
            || echo "::warning::Auto-merge failed; PR #$NUM left for manual merge."
