name: Sync Research Bookmarks

# Advances the research/bookmarks submodule pointer to the tip of the corpus
# repo, then opens + merges a single standing PR so the engines always build on
# the current corpus.
#
# Much simpler on Gitea: the corpus repo lives on this same instance and the
# runner is on the LAN, so the old token-injection + retry-through-the-tunnel
# workaround is gone.
#
# Secrets required:
#   GITEA_TOKEN — PAT with repo write (create/merge PRs).

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: sync-research-bookmarks
  cancel-in-progress: false

jobs:
  sync:
    name: Advance the bookmark submodule pointer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Advance submodule to corpus tip
        id: bump
        run: |
          BEFORE=$(git rev-parse HEAD:research/bookmarks)
          git submodule update --remote --recursive research/bookmarks
          AFTER=$(git -C research/bookmarks rev-parse HEAD)
          echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
          echo "after=$AFTER"   >> "$GITHUB_OUTPUT"
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Corpus unchanged ($BEFORE) - nothing to do."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Corpus advanced: $BEFORE -> $AFTER"
          fi

      - name: Commit, push, open + merge the standing PR
        if: steps.bump.outputs.has_changes == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          API: ${{ github.server_url }}/api/v1/repos/${{ github.repository }}
          BEFORE: ${{ steps.bump.outputs.before }}
          AFTER: ${{ steps.bump.outputs.after }}
        run: |
          set -e
          BRANCH="chore/auto-bookmarks-sync"

          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions@nexus-home.cc"
          git checkout -B "$BRANCH"
          git add research/bookmarks
          if git diff --staged --quiet; then
            echo "Pointer unchanged after staging; skipping."
            exit 0
          fi
          git commit -m "chore: update research bookmarks submodule"
          git push --force origin "$BRANCH"

          if [ -z "$GITEA_TOKEN" ]; then
            echo "::warning::GITEA_TOKEN not set - branch pushed, open the PR manually."
            exit 0
          fi

          AUTH="Authorization: token $GITEA_TOKEN"
          TITLE="chore: update research bookmarks submodule"
          BODY="Corpus pointer \`${BEFORE:0:8}\` -> \`${AFTER:0:8}\`."

          NUM=$(curl -sf -H "$AUTH" "$API/pulls?state=open&limit=50" \
                | python3 -c "import json,sys;print(next((p['number'] for p in json.load(sys.stdin) if p['head']['ref']=='$BRANCH'), ''))" || echo "")

          if [ -z "$NUM" ]; then
            NUM=$(curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" "$API/pulls" \
              -d "$(python3 -c "import json;print(json.dumps({'head':'$BRANCH','base':'main','title':'$TITLE','body':'''$BODY'''}))")" \
              | python3 -c "import json,sys;print(json.load(sys.stdin)['number'])")
            echo "Opened PR #$NUM"
          else
            echo "PR #$NUM already open; force-push updated it."
          fi

          # Mechanical pointer bump — safe to land zero-touch.
          curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
            "$API/pulls/$NUM/merge" \
            -d '{"Do":"squash","delete_branch_after_merge":true}' >/dev/null \
            && echo "Merged PR #$NUM" \
            || echo "::warning::Auto-merge failed; PR #$NUM left for manual merge."
