version: 2
updates:
  # npm: one grouped PR a week for all non-major updates; review majors by hand.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["dependencies", "automated"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "@docusaurus/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions: one grouped PR a month.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    labels: ["github-actions", "automated"]
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns: ["*"]
