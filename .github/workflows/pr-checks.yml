name: PR checks

# One fast, meaningful gate for pull requests: the site must build from source,
# and the model/case must pass the structural quality checks. Replaces the old
# scattered spell/lint/link/codeql-on-PR workflows.

on:
  pull_request:
    branches: [main]
    # Only run when files that affect the build or quality actually change,
    # so mechanical submodule-bump PRs don't sit on an "Action required" gate.
    paths:
      - 'template/**'
      - 'case/**'
      - 'parameters/**'
      - 'docs/**'
      - 'src/**'
      - '_engines/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docusaurus.config.js'
      - 'sidebars.js'
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci || npm install
          npm run postinstall || npx patch-package || true
      - name: Regenerate docs from source (template/case -> docs)
        run: npm run sync
      - name: Build website
        run: npm run build
        env:
          SITE_URL: https://docs.eco-balance.cc

  docs-quality:
    name: Docs quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Structural quality gate
        run: |
          node _engines/quality/audit.js
          node -e "
            const h = require('./src/data/health.json');
            const i = h.issues;
            const problems = [].concat(
              (i.domain_id_collisions || []).map(x => 'id-collision: ' + x),
              (i.orphan_decisions || []).map(x => 'orphan-decision: ' + x),
              (i.off_convention_decision_status || []).map(x => 'bad-status: ' + x),
              (i.parameter_gaps || []).map(x => 'param-gap: ' + x)
            );
            if (problems.length) {
              console.error('::error::Structural quality issues:');
              for (const p of problems) console.error(' - ' + p);
              process.exit(1);
            }
            console.log('Structural quality OK — overall health ' + h.overall + '/100 (' + h.overall_grade + '), ' + h.issues.uncovered_domains.length + ' uncovered domain(s).');
          "
