name: Sync Research Bookmarks

on:
  schedule:
    # Run every 6 hours to check for updates
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger
  repository_dispatch:
    # Allow external triggers (e.g., from bookmark repo webhook)
    types: [bookmarks-updated]

jobs:
  sync-submodule:
    name: Sync Research Bookmarks Submodule
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Configure Gitea submodule auth
        env:
          GITEA_USER: ${{ secrets.GITEA_USER }}
          GITEA_READ_TOKEN: ${{ secrets.GITEA_READ_TOKEN }}
        run: |
          if [ -z "$GITEA_READ_TOKEN" ]; then
            echo "::error::GITEA_READ_TOKEN secret is not set. Add a read-only Gitea token in repo Settings → Secrets → Actions."
            exit 1
          fi
          USER="${GITEA_USER:-pres}"
          git config --global url."https://${USER}:${GITEA_READ_TOKEN}@gitea.nexus-home.cc/".insteadOf "https://gitea.nexus-home.cc/"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Don't clone the submodule here — actions/checkout can't retry a
          # transient Gitea 502. It's initialised in the retried step below.
          submodules: false
          fetch-depth: 0

      - name: Update submodule (with retry)
        id: update-submodule
        run: |
          set -e
          echo "Updating research bookmarks submodule..."

          # Clean submodule SHA (git prefixes status with -/+/U; strip it).
          sub_sha() { git submodule status research/bookmarks 2>/dev/null | awk '{print $1}' | sed 's/^[-+U]//'; }

          # Retry Gitea network ops with exponential backoff so a transient
          # Cloudflare 502/5xx from the self-hosted origin doesn't fail the run.
          retry() {
            local max=5 delay=5 attempt=1 status=0
            until "$@"; do
              status=$?
              if [ "$attempt" -ge "$max" ]; then
                echo "::error::'$*' failed after $attempt attempts (exit $status)."
                return "$status"
              fi
              echo "::warning::Attempt $attempt of '$*' failed (exit $status); retrying in ${delay}s..."
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          SUBMODULE_OLD=$(sub_sha); [ -z "$SUBMODULE_OLD" ] && SUBMODULE_OLD="none"
          echo "Current submodule commit: $SUBMODULE_OLD"

          retry git submodule sync --recursive research/bookmarks
          retry git submodule update --init --depth 1 --recursive research/bookmarks
          # Checkout (not --merge): the tracked branch tip is authoritative, and
          # a plain checkout survives history rewrites (e.g. a squash) that would
          # otherwise fail with "refusing to merge unrelated histories".
          retry git submodule update --remote --depth 1 research/bookmarks

          SUBMODULE_NEW=$(sub_sha)
          echo "New submodule commit: $SUBMODULE_NEW"

          if [ "$SUBMODULE_OLD" != "$SUBMODULE_NEW" ] && [ "$SUBMODULE_OLD" != "none" ]; then
            echo "Submodule updated: $SUBMODULE_OLD -> $SUBMODULE_NEW"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "No changes in submodule"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Count Climate Change articles
        id: count_articles
        run: |
          CLIMATE_DIR="research/bookmarks/Climate Change"
          if [ -d "$CLIMATE_DIR" ]; then
            ARTICLE_COUNT=$(find "$CLIMATE_DIR" -maxdepth 1 -name "*.md" -type f | wc -l)
            echo "article_count=$ARTICLE_COUNT" >> $GITHUB_OUTPUT
            echo "Found $ARTICLE_COUNT Climate Change articles"
          else
            echo "article_count=0" >> $GITHUB_OUTPUT
            echo "::warning::Climate Change directory not found at $CLIMATE_DIR"
          fi

      - name: Commit and create PR
        if: steps.update-submodule.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add research/bookmarks .gitmodules

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          # Reuse a single stable branch so repeated runs update one PR
          # instead of opening a brand-new PR every 6 hours.
          BRANCH_NAME="chore/auto-bookmarks-sync"
          git checkout -B "$BRANCH_NAME"
          git commit -m "chore: update research bookmarks submodule

          - Updated to latest commit from gitea pres/bookmarks
          - Climate Change article count: ${{ steps.count_articles.outputs.article_count }}"
          git push --force origin "$BRANCH_NAME"

          # Create the PR only if one isn't already open for this branch.
          if gh pr view "$BRANCH_NAME" --json state -q '.state' 2>/dev/null | grep -q OPEN; then
            echo "PR for $BRANCH_NAME already open; force-push updated it."
          else
            gh pr create \
              --title "chore: update research bookmarks submodule" \
              --body "Automated submodule sync from gitea pres/bookmarks. Climate Change articles: ${{ steps.count_articles.outputs.article_count }}" \
              --base main \
              --head "$BRANCH_NAME"
          fi

          # Auto-merge once required checks pass (no-op if already enabled).
          gh pr merge "$BRANCH_NAME" --auto --squash --delete-branch \
            || echo "Could not enable auto-merge (check branch-protection / auto-merge settings)."

      - name: Create summary
        run: |
          echo "## Research Bookmarks Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.update-submodule.outputs.has_changes }}" == "true" ]; then
            echo "**Status:** Updated" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** No changes" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Climate Change articles:** ${{ steps.count_articles.outputs.article_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Submodule:** \`research/bookmarks\` (https://gitea.nexus-home.cc/pres/bookmarks)" >> $GITHUB_STEP_SUMMARY
