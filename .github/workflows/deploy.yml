name: Deploy to GitHub Pages

on:
  # Triggered by a monthly VERSION bump, or whenever built site content lands on
  # main (e.g. an auto-merged "Site Refresh (Engines)" PR) so publishing is automatic.
  push:
    branches:
      - main
    paths:
      - 'VERSION'
      - 'docs/**'
      - 'src/**'
      - 'static/**'
      - 'state/**'
      - 'docusaurus.config.js'
      - 'sidebars.js'
  # Can be called by other workflows (e.g., monthly-release)
  workflow_call:
  # Manual trigger for urgent deployments
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Docusaurus site to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          # Apply patches (patch-package runs in postinstall, but ensure it runs)
          npm run postinstall || npx patch-package

      - name: Fix frontmatter issues
        run: |
          if [ -d "docs" ]; then
            echo "📁 Checking docs directory..."
            echo "📊 Total markdown files: $(find docs -name '*.md' | wc -l)"
            node scripts/fix-frontmatter.js || echo "⚠️  Frontmatter fix script completed with warnings"
          else
            echo "⚠️  docs directory not found, skipping frontmatter fix"
          fi
      
      - name: Clear Docusaurus cache
        run: |
          echo "🧹 Clearing Docusaurus cache..."
          rm -rf .docusaurus || true
          npm run clear || true
          echo "✅ Cache cleared"
      
      - name: Determine BASE_URL
        id: base_url
        run: |
          # Check if custom domain is configured
          CUSTOM_DOMAIN_URL="${{ env.CUSTOM_DOMAIN_URL || vars.CUSTOM_DOMAIN_URL }}"
          CUSTOM_DOMAIN_BASE_URL="${{ env.CUSTOM_DOMAIN_BASE_URL || vars.CUSTOM_DOMAIN_BASE_URL }}"
          
          if [ -n "$CUSTOM_DOMAIN_BASE_URL" ]; then
            # Use explicitly set BASE_URL
            BASE_URL="$CUSTOM_DOMAIN_BASE_URL"
            echo "Using explicit BASE_URL: $BASE_URL"
          elif [ -n "$CUSTOM_DOMAIN_URL" ]; then
            # Custom domain is configured, use root path
            BASE_URL="/"
            echo "Custom domain detected, using BASE_URL: $BASE_URL"
          else
            # No custom domain, use project pages path
            BASE_URL="/eco-balance-documentation/"
            echo "No custom domain, using BASE_URL: $BASE_URL"
          fi
          
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT
          echo "BASE_URL will be: $BASE_URL"
      
      - name: Validate BASE_URL configuration
        run: |
          BASE_URL="${{ steps.base_url.outputs.base_url }}"
          CUSTOM_DOMAIN_URL="${{ env.CUSTOM_DOMAIN_URL || vars.CUSTOM_DOMAIN_URL }}"
          
          echo "🔍 Validating BASE_URL configuration..."
          echo "BASE_URL: $BASE_URL"
          echo "CUSTOM_DOMAIN_URL: $CUSTOM_DOMAIN_URL"
          
          # If custom domain is configured, BASE_URL should be '/'
          if [ -n "$CUSTOM_DOMAIN_URL" ] && [ "$CUSTOM_DOMAIN_URL" != "" ]; then
            if [ "$BASE_URL" != "/" ]; then
              echo "❌ ERROR: Custom domain is configured ($CUSTOM_DOMAIN_URL) but BASE_URL is '$BASE_URL' (expected '/')"
              echo "💡 Fix: Set CUSTOM_DOMAIN_BASE_URL to '/' in GitHub repository variables"
              exit 1
            else
              echo "✅ Custom domain configuration is correct: BASE_URL='/' for $CUSTOM_DOMAIN_URL"
            fi
          else
            # No custom domain, should use project pages path
            if [ "$BASE_URL" != "/eco-balance-documentation/" ]; then
              echo "⚠️  WARNING: No custom domain configured, but BASE_URL is '$BASE_URL' (expected '/eco-balance-documentation/')"
              echo "💡 This is OK if you're testing, but ensure GitHub Pages is configured correctly"
            else
              echo "✅ Project pages configuration is correct: BASE_URL='/eco-balance-documentation/'"
            fi
          fi
      
      - name: Build website
        timeout-minutes: 15
        run: |
          set -e
          echo "🏗️  Building Docusaurus site..."
          echo "NODE_ENV: $NODE_ENV"
          echo "NODE_OPTIONS: $NODE_OPTIONS"
          echo "BASE_URL: $BASE_URL"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "📝 Capturing build output for error analysis..."
          npm run build 2>&1 | tee build-output.log || {
            echo ""
            echo "❌ Build failed. Analyzing errors..."
            echo ""
            echo "=== Frontmatter Errors ==="
            grep -i "error while parsing markdown front matter" build-output.log | head -20 || echo "No frontmatter errors found in grep"
            echo ""
            echo "=== Files with frontmatter issues ==="
            grep -B 5 "Error while parsing Markdown front matter" build-output.log | grep -E "\.md|docs/" | head -20 || echo "No file paths found"
            echo ""
            echo "=== All Build Errors (first 30) ==="
            grep -i "error" build-output.log | head -30 || echo "No errors found"
            echo ""
            echo "=== Full build output saved to build-output.log ==="
            exit 1
          }
          echo "Build command completed"
          if [ -d "build" ]; then
            echo "✅ Build directory exists"
            ls -la build/ | head -10
          else
            echo "❌ Build directory missing!"
            exit 1
          fi
        env:
          NODE_ENV: production
          NODE_OPTIONS: '--max-old-space-size=4096'
          # BASE_URL is determined by the "Determine BASE_URL" step above
          BASE_URL: ${{ steps.base_url.outputs.base_url }}
          SITE_URL: ${{ env.CUSTOM_DOMAIN_URL || vars.CUSTOM_DOMAIN_URL || 'https://docs.eco-balance.cc' }}
          # Search + chat are served by the eco-balance-mcp service at runtime;
          # nothing Meilisearch-related is needed at build time anymore.
          # Sentry configuration for error tracking
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_RELEASE: ${{ github.sha }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-output-log
          path: build-output.log
          retention-days: 7
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

